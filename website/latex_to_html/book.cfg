% book.cfg — tex4ht configuration for make4ht
% Minimal config: HTML5, MathJax passthrough, chapter splitting, TikZ SVG.
% All class tagging (theorems, algorithms, etc.) is handled by postprocess.py
% to avoid unbalanced-tag issues with \ConfigureEnv.

% TikZ: use dvisvgm driver when running under tex4ht
\ifdefined\HCode
  \def\pgfsysdriver{pgfsys-dvisvgm4ht.def}
\fi

\Preamble{xhtml,html5,mathjax,2,fn-in,charset=utf-8}

% TeX4ht's default HTML config uses the legacy `rungs` wrapper for
% Ghostscript-based PDF image conversion. That binary isn't available in the
% Ubuntu CI environment, but the underlying `gs` executable is.
\Configure{Ghostscript}{gs}

% --- Viewport meta for mobile ---
\Configure{@HEAD}{\HCode{<meta name="viewport" content="width=device-width, initial-scale=1.0">\Hnewline}}

% --- Fix fragile commands in captions (hyperref/nameref + tex4ht interaction) ---
% When hyperref's nameref writes caption text to .aux files, font commands
% and cross-references can expand with mismatched braces under tex4ht hooks.
% Neutralise them during aux-file writing so the content passes through safely.
\makeatletter
\Configure{CaptionCommandsFix}{%
  \let\textit\@firstofone
  \let\textbf\@firstofone
  \let\emph\@firstofone
  \let\small\relax
  \let\footnotesize\relax
  \let\scriptsize\relax
  \let\normalsize\relax
  \let\Cref\@gobble
  \let\cref\@gobble
  \let\cite\@gobble
  \let\textcite\@gobble
  \let\url\@firstofone
  \let\bm\@firstofone
}
% Same protection when writing TOC / LOF / LOT entries
\Configure{writetoc}{%
  \let\textit\@firstofone
  \let\textbf\@firstofone
  \let\emph\@firstofone
  \let\small\relax
  \let\footnotesize\relax
  \let\scriptsize\relax
  \let\Cref\@gobble
  \let\cref\@gobble
  \let\cite\@gobble
  \let\textcite\@gobble
  \let\url\@firstofone
  \let\bm\@firstofone
}
\makeatother

\begin{document}
\EndPreamble
